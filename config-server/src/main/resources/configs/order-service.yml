server:
  port: 8083
  error:
    include-message: always
    include-stacktrace: on_param

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/SmartInventoryOrderManagementSystem?createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  # Kafka configuration for Event-Driven Communication
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: order-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000

stripe:
  secret:
    key: ${STRIPE_SECRET_KEY} # Provided via environment variable or local config
  client:
    url: http://localhost:3000
