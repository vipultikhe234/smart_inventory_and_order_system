server:
  port: 8080

spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: 
              - "http://localhost:3000"
              - "http://localhost:3001"
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      default-filters:
        - AuthenticationFilter
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/users/**
        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/products/**, /api/v1/categories/**
        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/orders/**
        - id: inventory-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/inventory/**
        - id: cart-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/cart/**

# Shared JWT secret base64 encoded for JWT filter
jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
